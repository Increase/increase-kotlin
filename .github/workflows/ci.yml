name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: |
            8
            21
          cache: gradle

      - uses: gradle/actions/setup-gradle@v4

      - name: Lint
        run: ./scripts/lint

      - name: Build
        run: ./scripts/build

      - name: Test
        run: ./scripts/test
